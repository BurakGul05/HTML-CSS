      <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Ürün Sayfası - 3'lü Görünüm</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Arka plan beyaz */
        body {
            background-color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start; /* Görseldeki soldan başlama düzeni */
        }

        /* Ana Kapsayıcı: 79px üst ve 58px sol boşluk */
        .main-wrapper {
            padding-top: 79px;
            padding-left: 58px;
            padding-right: 58px;
            display: flex;
            gap: 30px; /* Kartlar arasındaki 30px boşluk */
        }

        /* Her Bir Ürün Kartı (563px Genişlik) */
        .product-card {
            width: 563px;
            display: flex;
            flex-direction: column;
        }

        /* Resim Alanı (563x683, #F6F6F6) */
        .image-placeholder {
            width: 563px;
            height: 683px;
            background-color: #F6F6F6;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px; /* Yazı alanı ile arası 30px */
            border: 1px dashed #ccc; /* Resim yokken alanı görmen için ince çizgi */
        }

        .image-placeholder img {
            max-width: 100%;
            height: auto;
        }

        /* Ürün Bilgi Alanı (Roboto Regular, 18px, #868686) */
        .info-section {
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            color: #868686;
            margin-bottom: 60px; /* Buton ile arası 60px */
        }

        .info-row {
            display: flex;
            margin-bottom: 6px;
        }

        .label {
            width: 140px;
        }

        .value {
            color: #000000;
        }

        /* Sipariş Adeti Girişi */
        .qty-input {
            width: 60px;
            background-color: #F0F0F0;
            border: 1px solid #D1D1D1;
            padding: 2px 5px;
            font-size: 16px;
        }

        /* Sepete Ekle Butonu (#1626FF, 75px Yükseklik, 25px Font) */
        .add-btn {
            width: 563px;
            height: 75px;
            background-color: #1626FF;
            color: #F0F0FD;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 25px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .add-btn:hover {
            opacity: 0.9;
        }
        




    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="product-card">
            <div class="image-placeholder">
               <img src="/img/product/shoe1.png" alt="">
            </div>
            <div class="info-section">
                <div class="info-row"><span class="label">Ürün</span><span class="value">NIKE</span></div>
                <div class="info-row"><span class="label">Türü</span><span class="value">Erkek Ayakkabı</span></div>
                <div class="info-row"><span class="label">Stok</span><span class="value">90</span></div>
                <div class="info-row"><span class="label">Sipariş Adeti</span><input type="number" value="1" class="qty-input"></div>
            </div>
            <button class="add-btn">SEPETE EKLE</button>
        </div>

        <div class="product-card">
            <div class="image-placeholder">
               <img src="/img/product/shoe2.png" alt="">
            </div>
            <div class="info-section">
                <div class="info-row"><span class="label">Ürün</span><span class="value">NIKE</span></div>
                <div class="info-row"><span class="label">Türü</span><span class="value">Erkek Ayakkabı</span></div>
                <div class="info-row"><span class="label">Stok</span><span class="value">90</span></div>
                <div class="info-row"><span class="label">Sipariş Adeti</span><input type="number" value="1" class="qty-input"></div>
            </div>
            <button class="add-btn">SEPETE EKLE</button>
        </div>

        <div class="product-card">
            <div class="image-placeholder">
               <img src="/img/product/shoe3.png" alt="">
            </div>
            <div class="info-section">
                <div class="info-row"><span class="label">Ürün</span><span class="value">NIKE</span></div>
                <div class="info-row"><span class="label">Türü</span><span class="value">Erkek Ayakkabı</span></div>
                <div class="info-row"><span class="label">Stok</span><span class="value">90</span></div>
                <div class="info-row"><span class="label">Sipariş Adeti</span><input type="number" value="1" class="qty-input"></div>
            </div>
            <button class="add-btn">SEPETE EKLE</button>
        </div>

    </div>

</body>
</html>
